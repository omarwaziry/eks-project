apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-s3-deployment
  labels:
    app: nginx-s3
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-s3
  template:
    metadata:
      labels:
        app: nginx-s3
    spec:
      # serviceAccountName: nginx-s3-sa (removed - not present in cluster)
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: nginx-s3
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080 # Matches the port defined in your Terraform Target Group!